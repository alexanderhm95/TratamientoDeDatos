<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
        <!-- Encabezado -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Registro de Usuario</h1>
            <p class="text-gray-600 mt-2">Complete el formulario para crear un nuevo usuario</p>
        </div>

        <!-- Formulario -->
        <form id="userForm" class="space-y-6">
            <!-- Campo Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    Nombre de Usuario <span class="text-red-500">*</span>
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username"
                    placeholder="ej: juanperez"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    required
                >
            </div>

            <!-- Campo Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    Correo Electrónico <span class="text-red-500">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="ej: usuario@email.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    required
                >
            </div>

            <!-- Campo Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Contraseña <span class="text-red-500">*</span>
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    required
                >
            </div>

            <!-- Campo Role (con valor por defecto 'user') -->
            <div>
                <label for="role" class="block text-sm font-medium text-gray-700 mb-2">
                    Rol
                </label>
                <select 
                    id="role" 
                    name="role"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white"
                >
                    <option value="user" selected>Usuario (user)</option>
                    <option value="admin">Administrador (admin)</option>
                    <option value="moderator">Moderador (moderator)</option>
                </select>
                <p class="text-xs text-gray-500 mt-1">Por defecto: 'user'</p>
            </div>

            <!-- Botón de envío -->
            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
                Crear Usuario
            </button>
        </form>

        <!-- Mensaje de respuesta (inicialmente oculto) -->
        <div id="responseMessage" class="mt-6 p-4 rounded-lg hidden"></div>
    </div>

    <script>
        document.getElementById('userForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Obtener valores del formulario
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            // Validación básica
            if (!username || !email || !password) {
                showMessage('Por favor complete todos los campos obligatorios', 'error');
                return;
            }

            // Validación de email simple
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Por favor ingrese un correo electrónico válido', 'error');
                return;
            }

            // Validación de contraseña (mínimo 6 caracteres)
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            // Crear objeto con los datos
            const userData = {
                username: username,
                email: email,
                password: password,
                role: role
            };

            try {
                // Enviar petición al backend
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('Usuario creado exitosamente', 'success');
                    // Limpiar formulario
                    document.getElementById('userForm').reset();
                } else {
                    showMessage(result.error || 'Error al crear el usuario', 'error');
                }
            } catch (error) {
                showMessage('Error de conexión con el servidor', 'error');
                console.error('Error:', error);
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('responseMessage');
            messageDiv.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'text-green-800', 'text-red-800');
            
            if (type === 'success') {
                messageDiv.classList.add('bg-green-100', 'text-green-800');
            } else {
                messageDiv.classList.add('bg-red-100', 'text-red-800');
            }
            
            messageDiv.textContent = text;
        }
    </script>
</body>
</html>
