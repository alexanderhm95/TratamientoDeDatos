<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Tratamiento de Datos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            height: 100vh;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="card shadow-lg p-4 login-card">
                
                <div class="text-center mb-4">
                    <h3 class="brand-title font-bold text-[1.3rem] ">Tratamiento de Datos</h3>
                    <p class="text-muted text-[1.1rem]">Iniciar Sesión</p>
                </div>

                <form id="loginForm">

                    <div class="form-floating mb-3">
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            placeholder="Username" 
                            required
                            minlength="3"
                            maxlength="20"
                            autocomplete="username"
                            title="Usuario de 3-20 caracteres (letras, números, guiones)"
                        >
                        <label for="username">Nombre de Usuario</label>
                        <small id="usernameError" class="text-danger d-none"></small>
                    </div>

                    <div class="form-floating mb-3" style="position: relative;">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="Password" 
                            required
                            minlength="6"
                            maxlength="128"
                            autocomplete="current-password"
                            style="padding-right: 40px;"
                        >
                        <label for="password">Contraseña</label>
                        <button 
                            type="button" 
                            class="password-toggle-btn" 
                            id="togglePassword" 
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6c757d; z-index: 10;"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                        <small id="passwordError" class="text-danger d-none"></small>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            Ingresar
                        </button>
                    </div>

                    <div class="text-center mt-2">
                        <a href="/forgot-password" class="text-decoration-none" style="color: #6c757d; font-size: 0.9rem;">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="text-center mt-3">
                        <p class="text-muted">¿No tienes cuenta? <a href="/register" class="text-decoration-none" style="color: #0d6efd; font-weight: 500;">Regístrate aquí</a></p>
                    </div>

                </form>

                <div id="responseMessage" class="mt-3"></div>

            </div>

        </div>
    </div>
</div>

<script>
// Toggle para mostrar/ocultar contraseña
document.getElementById("togglePassword").addEventListener("click", function(e) {
    e.preventDefault();
    const passwordInput = document.getElementById("password");
    const toggleIcon = this.querySelector("i");
    
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        toggleIcon.classList.remove("fa-eye-slash");
        toggleIcon.classList.add("fa-eye");
    }
});

// Limpiar espacios en tiempo real
document.getElementById("username").addEventListener("input", function() {
    this.value = this.value.trim();
});

// Validación client-side
function validateLoginForm() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const usernameError = document.getElementById("usernameError");
    const passwordError = document.getElementById("passwordError");
    
    // Validar username
    if (!username) {
        usernameError.textContent = "El usuario es requerido";
        usernameError.classList.remove("d-none");
        return false;
    }
    
    if (username.length < 3) {
        usernameError.textContent = "Usuario debe tener al menos 3 caracteres";
        usernameError.classList.remove("d-none");
        return false;
    }
    
    usernameError.classList.add("d-none");
    
    // Validar password
    if (!password) {
        passwordError.textContent = "La contraseña es requerida";
        passwordError.classList.remove("d-none");
        return false;
    }
    
    if (password.length < 6) {
        passwordError.textContent = "Contraseña debe tener al menos 6 caracteres";
        passwordError.classList.remove("d-none");
        return false;
    }
    
    passwordError.classList.add("d-none");
    return true;
}

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Validar antes de enviar
    if (!validateLoginForm()) {
        return;
    }

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const messageDiv = document.getElementById("responseMessage");
    const submitBtn = document.getElementById("submitBtn");

    messageDiv.innerHTML = "";
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';

    try {
        const response = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (response.ok) {
            // Guardar token JWT
            if (data.token) {
                localStorage.setItem("token", data.token);
            }

            messageDiv.innerHTML = `
                <div class="alert alert-success text-center">
                    <i class="fas fa-check-circle me-2"></i>Login exitoso ✔
                </div>
            `;

            // Redirigir al home después de 1 segundo
            setTimeout(() => {
                window.location.href = '/home';
            }, 1000);

        } else {
            messageDiv.innerHTML = `
                <div class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-circle me-2"></i>${data.message || "Credenciales inválidas"}
                </div>
            `;
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Ingresar';
        }

    } catch (error) {
        messageDiv.innerHTML = `
            <div class="alert alert-danger text-center">
                <i class="fas fa-exclamation-circle me-2"></i>Error de conexión con el servidor
            </div>
        `;
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Ingresar';
    }
});
</script>

<!-- Scripts de alertas automáticas -->
<script src="{{ url_for('static', filename='js/alerts.js') }}"></script>
<script>
    // Activar cierre automático de alertas en el formulario
    autoCloseNewAlerts('responseMessage', 1500);
</script>

</body>
</html>
